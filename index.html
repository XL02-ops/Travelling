<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇪🇸 巴塞罗那 2026 · 交互式旅行思维导图</title>
<style>
  :root{
    --bg:#0b1220;
    --bg2:#111c30;
    --panel:#16233b;
    --panel2:#1d2d49;
    --line:#94a3b8;
    --line-soft:#475569;
    --text:#e8eef7;
    --text-dim:#9fb0c7;
    --gold:#fbbf24;
    --terra:#f97316;
    --ocean:#38bdf8;
    --sage:#34d399;
    --violet:#a78bfa;
    --rose:#fb7185;
    --d1:#38bdf8;   /* Day1 海洋蓝 */
    --d2:#fbbf24;   /* Day2 高迪金 */
    --d3:#a78bfa;   /* Day3 圣家紫 */
    --d4:#34d399;   /* Day4 蒙锥克绿 */
    --prep:#fb7185; /* 准备 玫红 */
    --gift:#f97316; /* 伴手礼 橙 */
    --mem:#f472b6;  /* 记忆 粉 */
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(56,189,248,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(251,191,36,.08), transparent 60%),
      linear-gradient(160deg,#0b1220,#111c30 60%,#0b1220);
    color:var(--text);
    overflow-x:hidden;
  }

  /* ─── Hero ─── */
  .hero{
    position:relative;
    padding:54px 24px 28px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  .hero .flag{font-size:42px;letter-spacing:6px}
  .hero h1{
    font-size:clamp(28px,4vw,46px);
    font-weight:800;
    margin:8px 0 6px;
    background:linear-gradient(90deg,#fbbf24,#f97316,#fb7185);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .hero .sub{color:var(--text-dim);font-size:15px;letter-spacing:.5px}
  .hero .tags{
    margin-top:14px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  }
  .tag{
    font-size:12px;padding:5px 12px;border-radius:999px;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
    color:var(--text-dim);
  }

  /* ─── Toolbar ─── */
  .toolbar{
    position:sticky;top:0;z-index:30;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:12px 24px;
    background:rgba(11,18,32,.82);backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  .toolbar .title{font-weight:700;font-size:14px;color:var(--text-dim);margin-right:auto}
  .btn{
    cursor:pointer;font-size:13px;padding:7px 14px;border-radius:8px;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    color:var(--text);transition:.18s;user-select:none;
  }
  .btn:hover{background:rgba(255,255,255,.12);transform:translateY(-1px)}
  .btn.primary{background:linear-gradient(90deg,#f97316,#fbbf24);border:none;color:#1a1208;font-weight:600}
  .legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}

  /* ─── Canvas ─── */
  #canvas{
    position:relative;
    overflow:auto;
    padding:40px 60px 80px;
    min-height:calc(100vh - 200px);
  }
  #canvas::-webkit-scrollbar{height:10px;width:10px}
  #canvas::-webkit-scrollbar-thumb{background:#334155;border-radius:6px}
  #canvas::-webkit-scrollbar-track{background:transparent}

  .tree{position:relative;display:inline-block;min-width:100%}
  .tree svg.connectors{
    position:absolute;top:0;left:0;pointer-events:none;z-index:0;
    overflow:visible;
  }

  /* ─── Nodes ─── */
  .node{
    position:relative;z-index:1;
    display:inline-flex;align-items:center;gap:8px;
    padding:10px 16px;border-radius:10px;
    background:var(--panel);border:1.5px solid rgba(255,255,255,.1);
    color:var(--text);font-size:14px;font-weight:600;
    cursor:pointer;transition:.18s;white-space:nowrap;
    box-shadow:0 4px 14px rgba(0,0,0,.25);
  }
  .node:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.4)}
  .node .chev{font-size:10px;color:var(--text-dim);transition:.2s}
  .node.collapsed .chev{transform:rotate(-90deg)}
  .node .badge{
    font-size:10px;padding:2px 7px;border-radius:6px;
    background:rgba(255,255,255,.12);color:var(--text-dim);font-weight:500;
  }

  /* root */
  .node.root{
    font-size:18px;padding:18px 28px;
    background:linear-gradient(135deg,#7c3aed,#a78bfa);
    border:none;color:#fff;
    box-shadow:0 10px 30px rgba(124,58,237,.4);
  }
  .node.root .sub{display:block;font-size:12px;font-weight:400;opacity:.85;margin-top:3px}

  /* level1 branches */
  .node.l1{font-size:15px;padding:12px 20px}
  .node.l1[data-c="d1"]{border-color:var(--d1);color:#bae6fd}
  .node.l1[data-c="d2"]{border-color:var(--d2);color:#fde68a}
  .node.l1[data-c="d3"]{border-color:var(--d3);color:#ddd6fe}
  .node.l1[data-c="d4"]{border-color:var(--d4);color:#a7f3d0}
  .node.l1[data-c="prep"]{border-color:var(--prep);color:#fecdd3}
  .node.l1[data-c="gift"]{border-color:var(--gift);color:#fed7aa}
  .node.l1[data-c="mem"]{border-color:var(--mem);color:#fbcfe8}

  /* level2 (time/place) */
  .node.l2{
    font-size:13px;font-weight:500;padding:8px 14px;
    background:var(--panel2);
  }
  .node.l2 .time{
    font-size:11px;color:var(--gold);font-weight:700;
    background:rgba(251,191,36,.12);padding:2px 6px;border-radius:5px;margin-right:4px;
  }

  /* level3 (highlights) */
  .node.l3{
    font-size:12px;font-weight:400;padding:6px 12px;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
    color:var(--text-dim);
  }
  .node.l3:hover{color:var(--text);background:rgba(255,255,255,.08)}

  /* layout helpers */
  .row{display:flex;align-items:flex-start;gap:0}
  .col{display:flex;flex-direction:column;gap:10px}
  .children-wrap{display:flex;align-items:flex-start}
  .root-wrap{display:flex;align-items:center;justify-content:center;min-width:100%;padding-bottom:30px}
  .root-wrap .root-col{display:flex;flex-direction:column;align-items:center;gap:30px}
  .sides{display:flex;gap:80px;align-items:flex-start;justify-content:center}
  .side{display:flex;flex-direction:column;gap:24px}
  .branch{display:flex;align-items:flex-start;gap:0}
  .branch.right{flex-direction:row}
  .branch.left{flex-direction:row-reverse}
  .branch .children{
    display:flex;flex-direction:column;gap:8px;
    margin:0 50px;
  }
  .branch.left .children{align-items:flex-end}
  .branch.right .children{align-items:flex-start}
  .sub-children{
    display:flex;flex-direction:column;gap:6px;
    margin:0 40px;
  }
  .branch.left .sub-children{align-items:flex-end}
  .branch.right .sub-children{align-items:flex-start}
  .node-group{display:flex;align-items:flex-start}
  .branch.left .node-group{flex-direction:row-reverse}
  .branch.right .node-group{flex-direction:row}

  /* ─── Detail Panel ─── */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.55);
    opacity:0;pointer-events:none;transition:.25s;z-index:40;
  }
  .overlay.show{opacity:1;pointer-events:auto}
  .panel{
    position:fixed;top:0;right:0;height:100vh;width:min(460px,92vw);
    background:linear-gradient(180deg,#16233b,#0f1a2e);
    border-left:1px solid rgba(255,255,255,.1);
    transform:translateX(100%);transition:.3s cubic-bezier(.4,0,.2,1);
    z-index:50;display:flex;flex-direction:column;
    box-shadow:-10px 0 40px rgba(0,0,0,.5);
  }
  .panel.show{transform:translateX(0)}
  .panel-head{
    padding:22px 24px 16px;border-bottom:1px solid rgba(255,255,255,.08);
    position:relative;
  }
  .panel-head .close{
    position:absolute;top:18px;right:18px;cursor:pointer;
    width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.06);font-size:16px;color:var(--text-dim);
  }
  .panel-head .close:hover{background:rgba(255,255,255,.12);color:var(--text)}
  .panel-head .eyebrow{font-size:11px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;font-weight:700}
  .panel-head h3{font-size:22px;margin:6px 0 4px;font-weight:800}
  .panel-head .meta{font-size:13px;color:var(--text-dim)}
  .panel-body{padding:20px 24px 40px;overflow-y:auto;flex:1}
  .panel-body::-webkit-scrollbar{width:6px}
  .panel-body::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
  .panel-body h4{font-size:13px;color:var(--gold);margin:18px 0 8px;font-weight:700;letter-spacing:.5px}
  .panel-body h4:first-child{margin-top:0}
  .panel-body p{font-size:14px;line-height:1.7;color:var(--text);margin-bottom:8px}
  .panel-body ul{list-style:none;padding:0}
  .panel-body li{
    font-size:13.5px;line-height:1.7;color:var(--text-dim);
    padding:5px 0 5px 18px;position:relative;
  }
  .panel-body li::before{
    content:"";position:absolute;left:4px;top:13px;
    width:5px;height:5px;border-radius:50%;background:var(--gold);
  }
  .panel-body .route{
    background:rgba(255,255,255,.04);border-radius:10px;padding:14px 16px;margin:8px 0;
  }
  .panel-body .route-step{
    font-size:13px;padding:4px 0;color:var(--text);display:flex;align-items:center;gap:8px;
  }
  .panel-body .route-arrow{color:var(--gold);font-size:11px}
  .panel-body .tip{
    background:rgba(251,191,36,.08);border-left:3px solid var(--gold);
    padding:10px 14px;border-radius:0 8px 8px 0;margin:10px 0;
    font-size:13px;color:#fde68a;line-height:1.6;
  }
  .panel-body .must{
    background:rgba(52,211,153,.08);border-left:3px solid var(--sage);
    padding:10px 14px;border-radius:0 8px 8px 0;margin:10px 0;
    font-size:13px;color:#a7f3d0;line-height:1.6;
  }

  /* ─── Footer ─── */
  .footer{
    text-align:center;padding:30px 24px;color:var(--text-dim);font-size:12px;
    border-top:1px solid rgba(255,255,255,.06);
  }

  /* responsive */
  @media(max-width:768px){
    .sides{flex-direction:column;gap:40px}
    .branch.left,.branch.right{flex-direction:column;align-items:center}
    .branch .children,.branch.left .children,.branch.right .children{align-items:center;margin:20px 0}
    .branch.left .sub-children,.branch.right .sub-children{align-items:center}
    #canvas{padding:24px 16px 60px}
  }
</style>
</head>

/* ═══════════════ RENDER ═══════════════ */
const tree = document.getElementById('tree');
const canvas = document.getElementById('canvas');

function makeNode(opts){
  const n = document.createElement('div');
  n.className = 'node ' + (opts.cls||'');
  if(opts.c) n.dataset.c = opts.c;
  if(opts.collapsed) n.classList.add('collapsed');
  let html = '';
  if(opts.chev) html += `<span class="chev">▼</span>`;
  if(opts.time) html += `<span class="time">${opts.time}</span>`;
  html += `<span class="label">${opts.label}</span>`;
  if(opts.badge) html += `<span class="badge">${opts.badge}</span>`;
  if(opts.sub) html += `<span class="sub">${opts.sub}</span>`;
  n.innerHTML = html;
  if(opts.onClick) n.addEventListener('click', e=>{ e.stopPropagation(); opts.onClick(n); });
  return n;
}

function makeChildren(items, side, depth){
  const wrap = document.createElement('div');
  // depth 1 = first level under L1 branch → .children (holds L2 nodes)
  // depth 2 = under L2 node → .sub-children (holds L3 leaves)
  wrap.className = depth===1 ? 'children' : 'sub-children';
  items.forEach(item=>{
    if(typeof item === 'string'){
      const leaf = makeNode({cls:'l3', label:item, chev:false});
      wrap.appendChild(leaf);
    } else {
      const hasKids = item.children && item.children.length;
      const node = makeNode({
        cls: depth===1 ? 'l2' : 'l3',
        label: item.label,
        time: item.time,
        chev: hasKids,
        collapsed: true,
        onClick: (el)=>{
          if(item.detail){ openPanel(item.detail); }
          if(hasKids){
            el.classList.toggle('collapsed');
            const sub = el.parentElement.querySelector(':scope > .sub-children');
            if(sub) sub.style.display = el.classList.contains('collapsed') ? 'none' : 'flex';
            setTimeout(drawLines, 50);
          }
        }
      });
      if(hasKids){
        // group node + its sub-children together in a row
        const group = document.createElement('div');
        group.className = 'node-group';
        group.appendChild(node);
        const sub = makeChildren(item.children, side, depth+1);
        // sync initial display with collapsed state
        if(node.classList.contains('collapsed')) sub.style.display = 'none';
        group.appendChild(sub);
        wrap.appendChild(group);
      } else {
        wrap.appendChild(node);
      }
    }
  });
  return wrap;
}

function makeBranch(branch, side){
  const b = document.createElement('div');
  b.className = 'branch ' + side;
  const node = makeNode({
    cls:'l1', c:branch.c, label:branch.label, badge:branch.date, chev:true,
    onClick:(el)=>{
      el.classList.toggle('collapsed');
      const ch = el.parentElement.querySelector(':scope > .children');
      if(ch) ch.style.display = el.classList.contains('collapsed') ? 'none' : 'flex';
      setTimeout(drawLines, 50);
    }
  });
  b.appendChild(node);
  if(branch.children){
    const ch = makeChildren(branch.children, side, 1);
    b.appendChild(ch);
  }
  return b;
}

function render(){
  tree.innerHTML = '';
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.classList.add('connectors');
  tree.appendChild(svg);

  const rootWrap = document.createElement('div');
  rootWrap.className = 'root-wrap';
  const rootCol = document.createElement('div');
  rootCol.className = 'root-col';

  const rootNode = makeNode({
    cls:'root', label:DATA.root.label, sub:DATA.root.sub, chev:false
  });
  rootCol.appendChild(rootNode);

  const sides = document.createElement('div');
  sides.className = 'sides';
  const leftSide = document.createElement('div');
  leftSide.className = 'side';
  const rightSide = document.createElement('div');
  rightSide.className = 'side';

  DATA.left.forEach(b=>leftSide.appendChild(makeBranch(b,'left')));
  DATA.right.forEach(b=>rightSide.appendChild(makeBranch(b,'right')));

  sides.appendChild(leftSide);
  sides.appendChild(rightSide);
  rootCol.appendChild(sides);
  rootWrap.appendChild(rootCol);
  tree.appendChild(rootWrap);

  setTimeout(drawLines, 100);
}

/* ═══════════════ CONNECTORS ═══════════════ */
function drawLines(){
  const svg = tree.querySelector('svg.connectors');
  if(!svg) return;
  svg.innerHTML = '';
  const tRect = tree.getBoundingClientRect();
  svg.setAttribute('width', tRect.width);
  svg.setAttribute('height', tRect.height);

  function rel(el){
    const r = el.getBoundingClientRect();
    return {
      cx: r.left - tRect.left + r.width/2,
      cy: r.top - tRect.top + r.height/2,
      left: r.left - tRect.left,
      right: r.right - tRect.left,
      top: r.top - tRect.top,
      bottom: r.bottom - tRect.top
    };
  }

  function line(x1,y1,x2,y2,color,w){
    const l = document.createElementNS('http://www.w3.org/2000/svg','path');
    const mx = (x1+x2)/2;
    const d = `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`;
    l.setAttribute('d', d);
    l.setAttribute('stroke', color);
    l.setAttribute('stroke-width', w);
    l.setAttribute('fill','none');
    l.setAttribute('stroke-linecap','round');
    svg.appendChild(l);
  }

  const colors = {
    prep:'#fb7185', d1:'#38bdf8', d2:'#fbbf24', d3:'#a78bfa', d4:'#34d399',
    gift:'#f97316', mem:'#f472b6'
  };

  // root → l1
  const root = tree.querySelector('.node.root');
  const rootR = rel(root);

  document.querySelectorAll('.side').forEach(side=>{
    const isLeft = side.classList.contains('side') && side.parentElement.parentElement.querySelector('.side:first-child') === side;
    // determine side by position
  });

  // left branches: root.left → branch.right
  document.querySelectorAll('.sides > .side:first-child .branch').forEach(branch=>{
    const l1 = branch.querySelector(':scope > .node.l1');
    if(!l1) return;
    const l1r = rel(l1);
    const color = colors[l1.dataset.c] || '#94a3b8';
    line(rootR.left, rootR.cy, l1r.right, l1r.cy, color, 2.5);
    drawBranchChildren(l1, 'left', color);
  });
  // right branches: root.right → branch.left
  document.querySelectorAll('.sides > .side:last-child .branch').forEach(branch=>{
    const l1 = branch.querySelector(':scope > .node.l1');
    if(!l1) return;
    const l1r = rel(l1);
    const color = colors[l1.dataset.c] || '#94a3b8';
    line(rootR.right, rootR.cy, l1r.left, l1r.cy, color, 2.5);
    drawBranchChildren(l1, 'right', color);
  });
}

function drawBranchChildren(l1Node, side, color){
  const tRect = tree.getBoundingClientRect();
  const l1r = (function(){
    const r = l1Node.getBoundingClientRect();
    return {cx:r.left-tRect.left+r.width/2, cy:r.top-tRect.top+r.height/2, left:r.left-tRect.left, right:r.right-tRect.left};
  })();
  const svg = tree.querySelector('svg.connectors');

  // find direct children container (sibling of l1 node within branch)
  const childrenWrap = l1Node.parentElement.querySelector(':scope > .children');
  if(!childrenWrap || childrenWrap.style.display==='none') return;

  // L2 nodes may be direct children of .children, or inside .node-group
  const childNodes = [];
  Array.from(childrenWrap.children).forEach(child=>{
    if(child.classList && child.classList.contains('node') && child.classList.contains('l2')){
      childNodes.push(child);
    } else if(child.classList && child.classList.contains('node-group')){
      const l2 = child.querySelector(':scope > .node.l2');
      if(l2) childNodes.push(l2);
    }
  });

  childNodes.forEach(ch=>{
    const r = ch.getBoundingClientRect();
    const cr = {cx:r.left-tRect.left+r.width/2, cy:r.top-tRect.top+r.height/2, left:r.left-tRect.left, right:r.right-tRect.left};
    const x1 = side==='left' ? l1r.left : l1r.right;
    const x2 = side==='left' ? cr.right : cr.left;
    const l = document.createElementNS('http://www.w3.org/2000/svg','path');
    const mx = (x1+x2)/2;
    l.setAttribute('d', `M ${x1} ${l1r.cy} C ${mx} ${l1r.cy}, ${mx} ${cr.cy}, ${x2} ${cr.cy}`);
    l.setAttribute('stroke','#94a3b8'); l.setAttribute('stroke-width',2);
    l.setAttribute('fill','none'); l.setAttribute('stroke-linecap','round');
    svg.appendChild(l);

    // sub children: look in the same node-group
    const group = ch.parentElement;
    const subWrap = group.classList && group.classList.contains('node-group')
      ? group.querySelector(':scope > .sub-children')
      : ch.parentElement.querySelector(':scope > .sub-children');
    if(subWrap && subWrap.style.display!=='none'){
      const subs = subWrap.querySelectorAll(':scope > .node.l3');
      subs.forEach(s=>{
        const sr = s.getBoundingClientRect();
        const scr = {cy:sr.top-tRect.top+sr.height/2, left:sr.left-tRect.left, right:sr.right-tRect.left};
        const sx1 = side==='left' ? cr.left : cr.right;
        const sx2 = side==='left' ? scr.right : scr.left;
        const sl = document.createElementNS('http://www.w3.org/2000/svg','path');
        const smx = (sx1+sx2)/2;
        sl.setAttribute('d', `M ${sx1} ${cr.cy} C ${smx} ${cr.cy}, ${smx} ${scr.cy}, ${sx2} ${scr.cy}`);
        sl.setAttribute('stroke','#a8b4c2'); sl.setAttribute('stroke-width',1.5);
        sl.setAttribute('fill','none'); sl.setAttribute('stroke-linecap','round');
        svg.appendChild(sl);
      });
    }
  });
}

/* ═══════════════ PANEL ═══════════════ */
const overlay = document.getElementById('overlay');
const panel = document.getElementById('panel');
const pEyebrow = document.getElementById('pEyebrow');
const pTitle = document.getElementById('pTitle');
const pMeta = document.getElementById('pMeta');
const pBody = document.getElementById('pBody');

function openPanel(d){
  pEyebrow.textContent = d.eyebrow || '';
  pTitle.textContent = d.title || '';
  pMeta.textContent = d.meta || '';
  let html = '';
  (d.sections||[]).forEach(s=>{
    if(s.h) html += `<h4>${s.h}</h4>`;
    if(s.p) html += `<p>${s.p}</p>`;
    if(s.list) html += `<ul>${s.list.map(i=>`<li>${i}</li>`).join('')}</ul>`;
    if(s.route) html += `<div class="route">${s.route.map((step,i)=>`<div class="route-step">${i>0?'<span class="route-arrow">↓</span>':''}<span>${step}</span></div>`).join('')}</div>`;
    if(s.tip) html += `<div class="tip">💡 ${s.tip}</div>`;
    if(s.must) html += `<div class="must">⭐ ${s.must}</div>`;
  });
  pBody.innerHTML = html;
  overlay.classList.add('show');
  panel.classList.add('show');
}
function closePanel(){
  overlay.classList.remove('show');
  panel.classList.remove('show');
}
document.getElementById('closePanel').addEventListener('click', closePanel);
overlay.addEventListener('click', closePanel);

/* ═══════════════ CONTROLS ═══════════════ */
document.getElementById('expandAll').addEventListener('click', ()=>{
  document.querySelectorAll('.node.collapsed').forEach(n=>n.classList.remove('collapsed'));
  document.querySelectorAll('.children, .sub-children').forEach(c=>c.style.display='flex');
  setTimeout(drawLines, 50);
});
document.getElementById('collapseAll').addEventListener('click', ()=>{
  document.querySelectorAll('.node.l1, .node.l2').forEach(n=>{
    if(n.querySelector('.chev')) n.classList.add('collapsed');
  });
  document.querySelectorAll('.sub-children').forEach(c=>c.style.display='none');
  setTimeout(drawLines, 50);
});
document.getElementById('resetView').addEventListener('click', ()=>{
  document.querySelectorAll('.node.collapsed').forEach(n=>n.classList.remove('collapsed'));
  document.querySelectorAll('.children, .sub-children').forEach(c=>c.style.display='flex');
  canvas.scrollTo({left:0, top:0, behavior:'smooth'});
  closePanel();
  setTimeout(drawLines, 50);
});

window.addEventListener('resize', ()=>setTimeout(drawLines, 100));

render();
</script>
